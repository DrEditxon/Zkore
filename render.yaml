services:
  - type: web
    name: zkore-prediction-api
    env: python
    disk:
      name: zkore-models-cache
      mountPath: /opt/render/project/src/backend/app/models
      sizeGB: 1
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -k uvicorn.workers.UvicornWorker --timeout 120 --bind 0.0.0.0:$PORT backend.app.main:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ENFORCE_API_KEY
        value: "False"
      - key: ZKORE_API_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: CACHE_DURATION
        value: "3600"
      - key: CACHE_DURATION_HISTORICAL
        value: "86400"
      - key: MIN_MATCHES_REQUIRED
        value: "30"
