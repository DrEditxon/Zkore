<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predicción de Fútbol - Inteligencia Avanzada</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="bg-decoration">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <div class="container main-layout">
        <header>
            <h1>⚽ Pronóstico Inteligente</h1>
            <p id="app-subtitle">Selecciona una liga para comenzar</p>
        </header>

        <section class="league-picker-section">
            <div class="league-selection">
                <select id="league" onchange="loadMatches()">
                    <option value="" disabled selected>Cargando ligas...</option>
                </select>
            </div>
        </section>

        <!-- Match Grid Section -->
        <section id="matches-section" style="display: none;">
            <div class="section-header">
                <div class="league-info">
                    <img id="league-flag" src="" alt="" class="flag-icon" style="display: none;">
                    <h2 id="current-league-name">Nombre de la Liga</h2>
                </div>
                <div id="matchday-badge" class="matchday-badge">Jornada 0</div>
            </div>
            <div id="match-grid" class="match-grid">
                <!-- Se llenará dinámicamente -->
            </div>
        </section>

        <!-- Loading State -->
        <div id="grid-loader" class="loader-container" style="display: none;">
            <div class="spinner"></div>
            <p>Calculando probabilidades de la jornada...</p>
        </div>
    </div>

    <!-- Modal for Detailed Prediction -->
    <div id="prediction-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">×</button>
            <div id="modal-body" class="modal-body-scroll">
                <!-- El contenido de result se moverá aquí -->
                <div id="result" class="result-area"></div>
            </div>
        </div>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <script src="/static/app.js"></script>
</body>

</html>
