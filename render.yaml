services:
  - type: web
    name: zkore-prediction-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
