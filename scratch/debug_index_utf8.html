<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predicci├│n de F├║tbol - Inteligencia Avanzada</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-decoration">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <div class="container main-layout">
        <header>
            <h1>ÔÜ¢ Pron├│stico Inteligente</h1>
            <p id="app-subtitle">Selecciona una liga para comenzar</p>
        </header>

        <section class="league-picker-section">
            <div class="league-selection">
                <select id="league" onchange="onLeagueChange()">
                    <option value="" disabled selected>Cargando ligas...</option>
                </select>
            </div>
        </section>

        <section id="history-section" class="history-section">
            <div class="history-card" onclick="toggleHistoryDetails()">
                <div class="history-content">
                    <div class="chart-container">
                        <svg viewBox="0 0 36 36" class="circular-chart">
                            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path id="history-chart-hit" class="circle hit" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path id="history-chart-miss" class="circle miss" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <text x="18" y="20.35" class="percentage" id="history-accuracy">0%</text>
                        </svg>
                    </div>
                    <div class="history-info">
                        <h3>Historial de Aciertos</h3>
                        <p id="history-summary">Analizando ├║ltimos resultados...</p>
                        <span class="click-info">Haz clic para ver detalles</span>
                    </div>
                </div>
                <div id="history-details" class="history-details-list" style="display: none;"></div>
            </div>
        </section>

        <section id="matches-section" style="display: none;">
            <div class="section-header">
                <div class="league-info">
                    <img id="league-flag" src="" alt="" class="flag-icon" style="display: none;">
                    <h2 id="current-league-name">Nombre de la Liga</h2>
                </div>
                <div id="matchday-badge" class="matchday-badge">Jornada 0</div>
            </div>
            <div id="match-grid" class="match-grid"></div>
        </section>

        <div id="grid-loader" class="loader-container" style="display: none;">
            <div class="spinner"></div>
            <p>Calculando probabilidades de la jornada...</p>
        </div>
    </div>

    <div id="prediction-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">├ù</button>
            <div id="modal-body" class="modal-body-scroll">
                <div id="result" class="result-area"></div>
            </div>
        </div>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <script src="/static/app.js"></script>
</body>
</html>
