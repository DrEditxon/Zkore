services:
  - type: web
    name: zkore-prediction-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT backend.app.main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: RAPIDAPI_HOST
        value: api-football-v1.p.rapidapi.com
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: CACHE_DURATION
        value: "3600"
      - key: CACHE_DURATION_HISTORICAL
        value: "86400"
      - key: MIN_MATCHES_REQUIRED
        value: "30"
